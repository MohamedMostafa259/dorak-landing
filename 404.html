<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorak App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
        }
        /* Hide content initially to prevent flashing before JS logic executes */
        #main-content {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="main-content" class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] max-w-sm w-full p-8 text-center relative overflow-hidden">
        
        <!-- Header / Logo -->
        <div class="mb-6">
            <img src="/assets/logos/dorak-logo-3d.png" alt="Dorak Logo" class="w-32 h-32 mx-auto mb-4 drop-shadow-md">
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">Open in Dorak</h1>
            <p class="text-sm text-gray-500 mt-2">This link requires the Dorak app to view and book your appointment.</p>
        </div>

        <!-- Primary CTA -->
        <a href="#" id="open-app-btn" class="block w-full py-3.5 px-4 bg-[#0a0a0a] hover:bg-[#1f1f1f] text-white font-medium rounded-xl transition-colors duration-200 shadow-md">
            Open in App
        </a>

        <!-- Fallback Stores -->
        <div class="mt-8 pt-6 border-t border-gray-100">
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Don't have the app?</p>
            <div class="flex flex-row justify-center gap-4">
                <a href="#" class="flex items-center justify-center w-16 h-16 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors duration-200 border border-gray-200" title="Get it on Google Play">
                    <img src="/assets/logos/google-play-store-logo.png" alt="Google Play" class="w-8 h-8 object-contain">
                </a>
                <a href="#" class="flex items-center justify-center w-16 h-16 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors duration-200 border border-gray-200" title="Download on the App Store">
                    <img src="/assets/logos/apple-app-store-logo.png" alt="App Store" class="w-8 h-8 object-contain">
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var path = window.location.pathname; // e.g. /p/arixQCi9R5E
            var content = document.getElementById('main-content');
            var btn = document.getElementById('open-app-btn');
            
            // Check if it's a professional profile deep link
            if (path.startsWith('/p/') && path.length > 3) {
                var slug = path.replace('/p/', '');
                
                // Show the card
                content.style.opacity = '1';

                // We use intent:// for Android Chrome, which gracefully falls back to the Play Store
                // if the app is not installed, depending on the S.browser_fallback_url.
                var androidIntent = 'intent://book/' + slug + '#Intent;scheme=dorak;package=dev.dorak.dorak;end';
                
                // Set the link. We'll use the Android intent by default.
                // On iOS, a standard universal link or custom URL scheme (dorak://book/slug) would be used.
                // For simplicity across both, assuming iOS universal links handle the domain directly,
                // but since we are ON the domain, we need the custom scheme for a forced redirect.
                var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                if (isIOS) {
                    btn.href = 'dorak://book/' + slug;
                } else {
                    btn.href = androidIntent;
                }

                // Auto-redirect attempt (optional, some browsers block this if not user-initiated)
                // window.location.href = btn.href;
            } else {
                // Not a deep link to a profile, just show a standard 404 message
                content.innerHTML = `
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">404</h1>
                    <p class="text-gray-500 mb-6">Page not found</p>
                    <a href="https://dorak.dev" class="inline-block py-3 px-6 bg-black text-white font-medium rounded-xl">Return Home</a>
                `;
                content.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
