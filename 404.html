<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorak App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            background-color: #5e6ad2;
            border-radius: 16px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        p {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            background-color: #5e6ad2;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .stores {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .stores a {
            flex: 1;
            padding: 10px;
            background-color: #000;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .fallback {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="main-content">
        <div class="logo">D</div>
        <h1>This link can only be opened with Dorak</h1>
        <p>If you have the app installed, click the button below to proceed and book your appointment.</p>
        
        <a href="#" id="open-app-btn" class="btn">Click here to proceed</a>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
            <p style="margin-bottom: 15px; font-size: 14px;">Don't have Dorak yet?</p>
            <div class="stores">
                <a href="#">Google Play</a>
                <a href="#">Apple Store</a>
            </div>
        </div>
    </div>

    <script>
        // Only trigger this deep link UI if the path starts with /p/
        const path = window.location.pathname;
        if (path.startsWith('/p/')) {
            // Attempt to automatically open the app
            const slug = path.split('/')[2];
            const appScheme = 'dorak://book/' + slug;
            document.getElementById('open-app-btn').href = appScheme;
            
            // Try to auto-redirect on mobile
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                setTimeout(function() {
                    window.location.href = appScheme;
                }, 100);
            }
        } else {
            // Standard 404 behavior for other missing pages
            document.getElementById('main-content').innerHTML = '<h1>404 - Page Not Found</h1><a href="/" class="btn" style="margin-top: 20px;">Return Home</a>';
        }
    </script>
</body>
</html>
