<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorak | The Elite Salon Experience</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
        }
        p.subtitle {
            font-size: 1.5rem;
            color: #a1a1aa;
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.5;
        }
        .contact-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 1rem 2rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }
        .contact-btn:hover {
            transform: scale(1.05);
        }
        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #27272a;
        }
        footer a {
            color: #a1a1aa;
            text-decoration: none;
            margin: 0 1rem;
            font-size: 0.9rem;
        }
        footer a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <main>
        <h1>Dorak.</h1>
        <p class="subtitle">The Elite Salon & Barber Booking Experience.</p>
        <p class="subtitle" style="font-size: 1.1rem;">Coming soon to iOS and Android.</p>
        <a href="mailto:support@dorak.dev" class="contact-btn">Contact Support</a>
    </main>
    <footer>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="mailto:support@dorak.dev">Support</a>
        <p style="color: #52525b; font-size: 0.8rem; margin-top: 1rem;">&copy; 2026 Dorak. All rights reserved.</p>
    </footer>
</body>
</html>
